[system]
timezone = "Asia/Shanghai"
log_level = "INFO"
db_path = "data/pangu.db"
watchlist_path = "config/watchlist.yaml"
global_market_mapping_path = "config/global_market_mapping.yaml"

[stock_pool]
# 过滤上市不满 N 天的新股 (避免数据不足导致因子计算异常)
min_listing_days = 60
# 因子池覆盖的指数代码 (000300=沪深300, 000905=中证500)
indices = ["000300", "000905"]

[strategy]
# 因子排名取 Top-N 进入 LLM 综合决策
top_n = 10
buy_threshold = 0.7
sell_threshold = 0.3
# 全球风险指数低于此值时，提高 buy_threshold 0.1 (设 -999 可禁用)
risk_dampen_threshold = -1.0

[llm]
# LiteLLM 模型标识符 (支持 $ENV_VAR 替换)
provider = "azure/$AZURE_DEPLOYMENT"
temperature = 0.1

[notification]
enabled = true

[notification.feishu]
app_id = "$FEISHU_APP_ID"
app_secret = "$FEISHU_APP_SECRET"

[scheduler]
# 时间格式: "HH:MM"
global_market_sync_time = "08:00"
signal_generate_time = "08:15"
domestic_market_sync_time = "18:00"
signal_verify_time = "20:00"
news_poll_start_time = "07:00"
news_poll_end_time = "20:00"
news_poll_interval_minutes = 60
# 每月几号同步交易日历和指数成分股
calendar_sync_day = 1
