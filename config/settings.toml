[system]
timezone = "Asia/Shanghai"
log_level = "INFO"
db_path = "data/pangu.db"
watchlist_path = "config/watchlist.yaml"
global_market_mapping_path = "config/global_market_mapping.yaml"

[stock_pool]
# 过滤上市不满 N 天的新股 (避免数据不足导致因子计算异常)
min_listing_days = 60
# 因子池覆盖的指数代码 (000300=沪深300, 000905=中证500)
indices = ["000300", "000905"]

[strategy]
# Production rebalance: target portfolio holds top_n stocks; weekly rebalance.
top_n = 25

[portfolio]
# Where the virtual target portfolio state is persisted (atomic JSON write)
state_path = "data/target_portfolio.json"
# Initial capital for share-size suggestions in T6 rebalance card (cold start全仓买入).
initial_capital = 100000.0

[llm]
# LiteLLM 模型标识符 (支持 $ENV_VAR 替换)
provider = "azure/$AZURE_DEPLOYMENT"
temperature = 0.1

[notification]
enabled = true

[notification.feishu]
app_id = "$FEISHU_APP_ID"
app_secret = "$FEISHU_APP_SECRET"

[scheduler]
# 时间格式: "HH:MM"
# T1 参考数据同步：交易日历 + 当前成分股快照（每月第一天 06:00）
reference_data_sync_time = "06:00"
reference_data_sync_day = 1
# T2 新闻轮询：全天 24h 整点抓取（覆盖海外隔夜电报）
news_poll_start_time = "00:00"
news_poll_end_time = "23:00"
news_poll_interval_minutes = 60
# T3 国内 K 线同步：交易日 18:00（收盘后）
domestic_kline_sync_time = "18:00"
# T4 国际交易同步：交易日 07:00（给 T6 留出 75min 缓冲；美股/商品 04-05 时已收盘，HK 09:00 才开盘）
international_data_sync_time = "07:00"
# T5 模型训练：每月第一天 02:00
model_training_time = "02:00"
model_training_day = 1
# T6 信号生成与调仓：交易日 08:15
signal_generation_time = "08:15"

[ml]
# ML 模型打分（T6 候选股来源）
enabled = true
model_dir = "models"
# 两阶段 TopkDropout 候选池规模
buy_candidate_size = 10       # 非持仓中 ML 顶部 N 只供 LLM 选 BUY
sell_candidate_size = 5       # 持仓中 ML 底部 N 只供 LLM 选 SELL
n_drop = 3                    # 每次调仓最多换手数
# 训练参数（生产单窗口 + walk-forward 回测共享）
first_train_start = "2020-01-01"
val_months = 3
n_seeds = 5
time_decay_halflife = 120
