services:
  worker:
    build: .
    container_name: pangu-worker
    volumes:
      - ./data:/app/data
      - ./config:/app/config
    env_file: .env
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "pgrep", "-f", "pangu"]
      interval: 60s
      timeout: 10s
      retries: 3
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
